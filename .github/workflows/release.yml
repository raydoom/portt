name: release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: tar.gz

          - os: macos-13
            target: x86_64-apple-darwin
            ext: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip

    runs-on: ${{ matrix.os }}
    outputs:
      artifact: portt-${{ matrix.target }}.${{ matrix.ext }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../portt-${{ matrix.target }}.tar.gz portt

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/portt.exe -DestinationPath portt-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: portt-${{ matrix.target }}.${{ matrix.ext }}
          path: portt-${{ matrix.target }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: portt-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: portt-*
          generate_release_notes: true
