name: release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: linux-amd64
            ext: tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            pkg: linux-arm64
            ext: tar.gz

          - os: macos-13
            target: x86_64-apple-darwin
            pkg: darwin-amd64
            ext: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: darwin-arm64
            ext: tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            pkg: freebsd-amd64
            ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: windows-amd64
            ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Set release name
        id: rel
        run: echo "name=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        env:
          ARCHIVE: portt-v${{ steps.rel.outputs.name }}-${{ matrix.pkg }}.tar.gz
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../$ARCHIVE portt

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        env:
          ARCHIVE: portt-v${{ steps.rel.outputs.name }}-${{ matrix.pkg }}.zip
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/portt.exe -DestinationPath $env:ARCHIVE

      - uses: actions/upload-artifact@v4
        with:
          name: portt-v${{ steps.rel.outputs.name }}-${{ matrix.pkg }}.${{ matrix.ext }}
          path: portt-v${{ steps.rel.outputs.name }}-${{ matrix.pkg }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: portt-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: portt-*
          generate_release_notes: true
